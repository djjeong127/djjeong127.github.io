<div class="christmas-feature">
    @if (dates.isChristmas()) {
        <div>MERRY CHRISTMAS</div>
    }
    @else {
        <div class="countdown">
            <div class="countdown-title">Christmas Countdown</div>
            <div class="countdown-timer">
                <div class="countdown-timer-block">
                    <div class="countdown-timer-block-title">Days</div>
                    <div class="countdown-timer-block-value">{{ dates.timeUntilChristmas().days }}</div>
                </div>
                <div class="countdown-timer-block">
                    <div class="countdown-timer-block-title">Hours</div>
                    <div class="countdown-timer-block-value">{{ dates.timeUntilChristmas().hours }}</div>
                </div>
                <div class="countdown-timer-block">
                    <div class="countdown-timer-block-title">Minutes</div>
                    <div class="countdown-timer-block-value">{{ dates.timeUntilChristmas().minutes }}</div>
                </div>
                <div class="countdown-timer-block">
                    <div class="countdown-timer-block-title">Seconds</div>
                    <div class="countdown-timer-block-value">{{ dates.timeUntilChristmas().seconds }}</div>
                </div>
            </div>
        </div>
    }
</div>
